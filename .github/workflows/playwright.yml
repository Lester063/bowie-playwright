name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bowieapi
          # Removed MYSQL_USER and MYSQL_PASSWORD here
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, pdo_mysql

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16.16.0

      - name: Install Laravel dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --optimize-autoloader
        working-directory: ./bowie-api

      - name: Install React dependencies
        run: npm ci
        working-directory: ./bowie-react

      - name: Copy Laravel .env for CI
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=your_db/DB_DATABASE=bowieapi/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/' .env
        working-directory: ./bowie-api

      - name: Generate Laravel app key
        run: php artisan key:generate
        working-directory: ./bowie-api

      - name: Run Laravel migrations and seed database
        run: php artisan migrate:fresh --seed --force
        working-directory: ./bowie-api

      - name: Start Laravel backend
        run: php artisan serve --host=0.0.0.0 --port=8000 &
        working-directory: ./bowie-api
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bowieapi
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Start React frontend
        run: npm start &
        working-directory: ./bowie-react

      - name: Wait for Laravel backend to be ready
        run: npx wait-on http://localhost:8000

      - name: Wait for React frontend to be ready
        run: npx wait-on http://localhost:3000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
